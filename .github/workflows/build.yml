name: Build LogCam IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build LogCam
        run: |
          xcodebuild \
            -project LogCam/LogCam.xcodeproj \
            -scheme LogCam \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build/ \
            build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogCam-build
          path: build/Build/Products/Release-iphoneos/
          retention-days: 7
